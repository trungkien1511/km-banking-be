spring.application.name=km-banking-be
spring.profiles.active=dev

server.port=8080

# JPA Common
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:kmBankSecretKeyForJWTAuthMustBeAtLeast256BitsLongForHS256Algorithm}
jwt.expiration-seconds=900
